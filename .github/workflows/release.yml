name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      solution:
        description: 'Build configuration'
        required: true
        default: 'RelWithDebInfo'
        type: string
      artifact:
        description: 'Upload to artifact'
        required: false
        default: true
        type: boolean
      release:
        description: 'Create a release'
        required: false
        default: true
        type: boolean
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      rel_tag:
        description: 'Release tag (e.g. 2.1.0)'
        required: false
        default: ''
        type: string
      rel_title:
        description: 'Release title'
        required: false
        default: ''
        type: string
      rel_desc:
        description: 'Release description'
        required: false
        default: ''
        type: string

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.rel_info.outputs.tag_name }}
      title: ${{ steps.rel_info.outputs.title }}
      desc_body: ${{ steps.rel_info.outputs.desc_body }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set release info
        id: rel_info
        env:
          INPUT_TAG: ${{ inputs.rel_tag }}
          INPUT_TITLE: ${{ inputs.rel_title }}
          INPUT_DESC: ${{ inputs.rel_desc }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME#v}"
            title="v$tag"
            current_ref="$GITHUB_SHA"
            previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_SHA^" 2>/dev/null || true)"
          else
            tag="$INPUT_TAG"
            title="${INPUT_TITLE:-v$INPUT_TAG}"
            current_ref="$GITHUB_SHA"
            previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_SHA" 2>/dev/null || true)"
            if [ -n "$INPUT_DESC" ]; then
              desc="$INPUT_DESC"
            fi
          fi

          if [ -z "${desc:-}" ]; then
            if [ -n "$previous_tag" ]; then
              range="$previous_tag..$current_ref"
              heading="## Changes from $previous_tag to v$tag"
            else
              range="$current_ref"
              heading="## Changes in v$tag"
            fi
            changes="$(git log --pretty=format:'- %s (`%h`)' "$range")"
            desc="$(printf '%s\n\n%s' "$heading" "$changes")"
          fi

          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          delimiter="release_desc_$(date +%s%N)"
          echo "desc_body<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$desc" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

  build-win:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install LLVM and Ninja
        run: choco install llvm ninja --no-progress

      - name: Build
        shell: pwsh
        env:
          BUILD_TYPE: ${{ inputs.solution || 'RelWithDebInfo' }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
        run: |
          $cmakeArgs = @(
            '-G', 'Ninja',
            '-DCMAKE_C_COMPILER=clang-cl',
            "-DCMAKE_BUILD_TYPE=$env:BUILD_TYPE",
            '-S', '.',
            '-B', 'build'
          )
          if ($env:RELEASE_TAG) {
            $cmakeArgs += "-DMP_VERSION=$env:RELEASE_TAG"
          }
          cmake @cmakeArgs
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Upload Windows files
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            build/endstone_mediaplayer.dll
            build/endstone_mediaplayer.pdb
          retention-days: 1

  build-linux:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install LLVM and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build

      - name: Build
        env:
          BUILD_TYPE: ${{ inputs.solution || 'RelWithDebInfo' }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
        run: |
          cmake_args=(
            -G Ninja
            -DCMAKE_C_COMPILER=clang
            "-DCMAKE_BUILD_TYPE=$BUILD_TYPE"
            -S .
            -B build
          )
          if [ -n "$RELEASE_TAG" ]; then
            cmake_args+=("-DMP_VERSION=$RELEASE_TAG")
          fi
          cmake "${cmake_args[@]}"
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Upload Linux files
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: build/endstone_mediaplayer.so
          retention-days: 1

  release:
    needs: [prepare, build-win, build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download release files
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Package release
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
        run: |
          zip -j "endstone_mediaplayer_v$RELEASE_TAG.zip" release/*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: github.event_name == 'push' || inputs.artifact
        with:
          name: endstone_mediaplayer
          path: |
            release/endstone_mediaplayer.dll
            release/endstone_mediaplayer.pdb
            release/endstone_mediaplayer.so

      - name: Create release
        uses: softprops/action-gh-release@v3.0.1
        if: github.event_name == 'push' || inputs.release
        with:
          tag_name: v${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ github.event_name == 'push' && false || inputs.pre_release }}
          body: ${{ needs.prepare.outputs.desc_body }}
          files: endstone_mediaplayer_v${{ needs.prepare.outputs.tag_name }}.zip

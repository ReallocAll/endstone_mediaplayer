name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      solution:
        description: 'Build configuration'
        required: true
        default: 'RelWithDebInfo'
        type: string
      artifact:
        description: 'Upload to artifact'
        required: false
        default: true
        type: boolean
      release:
        description: 'Create a release'
        required: false
        default: true
        type: boolean
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      rel_tag:
        description: 'Release tag (e.g. 2.0.0)'
        required: false
        default: ''
        type: string
      rel_title:
        description: 'Release title'
        required: false
        default: ''
        type: string
      rel_desc:
        description: 'Release description'
        required: false
        default: ''
        type: string

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set release info
        id: rel_info
        shell: bash
        run: |
          echo "build_time=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          # Tag push: extract version from GITHUB_REF_NAME (v2.0.1 -> 2.0.1)
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
            echo "title=v$TAG" >> $GITHUB_OUTPUT
            echo "desc_body=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ inputs.rel_tag }}" >> $GITHUB_OUTPUT
            if [ -z "${{ inputs.rel_title }}" ]; then
              echo "title=v${{ inputs.rel_tag }}" >> $GITHUB_OUTPUT
            else
              echo "title=${{ inputs.rel_title }}" >> $GITHUB_OUTPUT
            fi
            if [ -z "${{ inputs.rel_desc }}" ]; then
              echo "desc_body=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
            else
              echo "desc_body=${{ inputs.rel_desc }}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install LLVM and Ninja
        run: choco install llvm ninja --no-progress

      - name: Build
        run: |
          $tag = "${{ steps.rel_info.outputs.tag_name }}"
          $cmake_args = "-G Ninja -DCMAKE_C_COMPILER=clang-cl -DCMAKE_BUILD_TYPE=RelWithDebInfo -S . -B build"
          if ($tag -ne "") { $cmake_args += " -DMP_VERSION=$tag" }
          Invoke-Expression "cmake $cmake_args"
          cmake --build build -j

      - name: Organize files
        run: |
          mkdir release
          cp build/endstone_mediaplayer.dll release/
          cp build/endstone_mediaplayer.pdb release/

      - name: Zip Release
        uses: TheDoctor0/zip-release@0.7.6
        with:
          filename: endstone_mediaplayer_v${{ steps.rel_info.outputs.tag_name }}.zip
          path: .
          directory: release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: github.event_name == 'push' || inputs.artifact
        with:
          name: endstone_mediaplayer
          path: |
            build/endstone_mediaplayer.dll
            build/endstone_mediaplayer.pdb

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        if: github.event_name == 'push' || inputs.release
        with:
          tag_name: v${{ steps.rel_info.outputs.tag_name }}
          name: ${{ steps.rel_info.outputs.title }}
          prerelease: ${{ github.event_name == 'push' && false || inputs.pre_release }}
          body: ${{ steps.rel_info.outputs.desc_body }}
          files: |
            release/endstone_mediaplayer_v${{ steps.rel_info.outputs.tag_name }}.zip
